    const { useState, useEffect, useRef } = React;


const MusicPlayer = ({ embedded = false }) => {
  const [currentTrack, setCurrentTrack] = useState(0);
  const [isPlaying, setIsPlaying] = useState(false);
  const [progress, setProgress] = useState(0);
  const [currentTime, setCurrentTime] = useState(0);
  const [duration, setDuration] = useState(0);
  const audioRef = useRef(null);

  const tracks = [
    { title: 'THIS IS WHO WE ARE', src: 'ThisIsWhoWeAre.mp3' },
    { title: 'WORKING FROM HOME', src: 'WorkingFromHome.mp3' },
    { title: 'POCKET CALL', src: 'PocketCall.mp3' },
  ];

  const formatTime = (s) => {
    if (!s || isNaN(s)) return '0:00';
    const mins = Math.floor(s / 60);
    const secs = Math.floor(s % 60);
    return mins + ':' + (secs < 10 ? '0' : '') + secs;
  };

  useEffect(() => {
    const audio = audioRef.current;
    if (!audio) return;

    const onTimeUpdate = () => {
      setCurrentTime(audio.currentTime);
      if (audio.duration) setProgress((audio.currentTime / audio.duration) * 100);
    };
    const onLoadedMetadata = () => setDuration(audio.duration);
    const onEnded = () => {
      setIsPlaying(false);
      setProgress(0);
      setCurrentTime(0);
    };

    audio.addEventListener('timeupdate', onTimeUpdate);
    audio.addEventListener('loadedmetadata', onLoadedMetadata);
    audio.addEventListener('ended', onEnded);
    return () => {
      audio.removeEventListener('timeupdate', onTimeUpdate);
      audio.removeEventListener('loadedmetadata', onLoadedMetadata);
      audio.removeEventListener('ended', onEnded);
    };
  }, [currentTrack]);

  useEffect(() => {
    const audio = audioRef.current;
    if (!audio) return;
    if (!tracks[currentTrack].src) {
      audio.pause();
      setIsPlaying(false);
      setProgress(0);
      setDuration(0);
      setCurrentTime(0);
      return;
    }
    audio.src = tracks[currentTrack].src;
    audio.load();
    setProgress(0);
    setCurrentTime(0);
    setDuration(0);
    if (isPlaying) {
      audio.play().catch(() => {});
    }
  }, [currentTrack]);

  const togglePlay = () => {
    const audio = audioRef.current;
    if (!audio || !tracks[currentTrack].src) return;
    if (isPlaying) {
      audio.pause();
      setIsPlaying(false);
    } else {
      audio.play().catch(() => {});
      setIsPlaying(true);
    }
  };

  const handleSeek = (e) => {
    const audio = audioRef.current;
    if (!audio || !audio.duration) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const pct = x / rect.width;
    audio.currentTime = pct * audio.duration;
  };

  const handlePrev = () => {
    const prev = currentTrack === 0 ? tracks.length - 1 : currentTrack - 1;
    setCurrentTrack(prev);
  };

  const handleNext = () => {
    const next = currentTrack === tracks.length - 1 ? 0 : currentTrack + 1;
    setCurrentTrack(next);
  };

  const containerStyle = embedded
    ? {
        backgroundColor: 'transparent',
        padding: '0',
        width: '100%',
        maxWidth: '400px',
        margin: '0 auto',
      }
    : {
        position: 'fixed',
        bottom: '24px',
        left: '24px',
        backgroundColor: 'rgba(0,0,0,0.9)',
        border: '1px solid #333',
        padding: '16px 20px',
        zIndex: 100,
        minWidth: '280px',
      };

  return (
    <div style={containerStyle}>
      <audio ref={audioRef} preload="metadata" />
      <div
        style={{
          fontFamily: '"Fira Code", monospace',
          fontSize: '10px',
          color: '#666',
          marginBottom: '8px',
        }}
      >
        NOW PLAYING
      </div>
      <div
        style={{
          fontFamily: '"Bebas Neue", sans-serif',
          fontSize: '20px',
          color: '#fff',
          letterSpacing: '0.1em',
          marginBottom: '4px',
        }}
      >
        {tracks[currentTrack].title}
      </div>
      <div
        style={{
          fontFamily: '"Fira Code", monospace',
          fontSize: '11px',
          color: '#ff2d2d',
          marginBottom: '12px',
        }}
      >
        ULTRARABBIT • {formatTime(currentTime)} / {formatTime(duration)}
      </div>

      <div
        style={{
          width: '100%',
          height: '2px',
          backgroundColor: '#222',
          marginBottom: '12px',
          cursor: tracks[currentTrack].src ? 'pointer' : 'default',
        }}
        onClick={handleSeek}
      >
        <div
          style={{
            width: `${progress}%`,
            height: '100%',
            backgroundColor: '#ff2d2d',
            transition: 'width 0.1s linear',
          }}
        />
      </div>

      <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
        <button
          onClick={handlePrev}
          style={{
            background: 'transparent',
            border: 'none',
            color: '#666',
            cursor: 'pointer',
            padding: '4px',
            transition: 'color 0.2s',
          }}
          onMouseEnter={(e) => (e.target.style.color = '#fff')}
          onMouseLeave={(e) => (e.target.style.color = '#666')}
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
          </svg>
        </button>

        <button
          onClick={togglePlay}
          style={{
            background: tracks[currentTrack].src ? '#ff2d2d' : '#333',
            border: 'none',
            borderRadius: '50%',
            width: '36px',
            height: '36px',
            cursor: tracks[currentTrack].src ? 'pointer' : 'default',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            transition: 'transform 0.2s',
          }}
          onMouseEnter={(e) => tracks[currentTrack].src && (e.target.style.transform = 'scale(1.1)')}
          onMouseLeave={(e) => (e.target.style.transform = 'scale(1)')}
        >
          {isPlaying ? (
            <svg width="14" height="14" viewBox="0 0 24 24" fill="#000">
              <path d="M6 4h4v16H6zm8 0h4v16h-4z" />
            </svg>
          ) : (
            <svg width="14" height="14" viewBox="0 0 24 24" fill="#000">
              <path d="M8 5v14l11-7z" />
            </svg>
          )}
        </button>

        <button
          onClick={handleNext}
          style={{
            background: 'transparent',
            border: 'none',
            color: '#666',
            cursor: 'pointer',
            padding: '4px',
            transition: 'color 0.2s',
          }}
          onMouseEnter={(e) => (e.target.style.color = '#fff')}
          onMouseLeave={(e) => (e.target.style.color = '#666')}
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
          </svg>
        </button>

        <div style={{ marginLeft: 'auto', display: 'flex', gap: '6px' }}>
          {tracks.map((_, idx) => (
            <button
              key={idx}
              onClick={() => setCurrentTrack(idx)}
              style={{
                width: '8px',
                height: '8px',
                borderRadius: '50%',
                backgroundColor: idx === currentTrack ? '#ff2d2d' : '#333',
                border: 'none',
                cursor: 'pointer',
                padding: 0,
                transition: 'background-color 0.2s',
              }}
            />
          ))}
        </div>
      </div>
    </div>
  );
};

const SectionHeader = ({ title }) => {
  const headerRef = useRef(null);
  const [lineWidth, setLineWidth] = useState(0);

  useEffect(() => {
    if (headerRef.current) {
      setLineWidth(headerRef.current.offsetWidth);
    }
    const handleResize = () => {
      if (headerRef.current) {
        setLineWidth(headerRef.current.offsetWidth);
      }
    };
    window.addEventListener('resize', handleResize);
    return () => window.removeEventListener('resize', handleResize);
  }, [title]);

  return (
    <div style={{ marginBottom: '48px', display: 'inline-block' }}>
      <h2
        ref={headerRef}
        style={{
          fontFamily: '"Bebas Neue", sans-serif',
          fontSize: 'clamp(96px, 16vw, 144px)',
          color: '#fff',
          letterSpacing: '0.1em',
          marginBottom: '16px',
          lineHeight: 1,
          display: 'inline-block',
        }}
      >
        {title}
      </h2>
      <div
        style={{
          width: `${lineWidth}px`,
          height: '1px',
          backgroundColor: '#ff2d2d',
          transition: 'width 0.3s ease',
        }}
      />
    </div>
  );
};
