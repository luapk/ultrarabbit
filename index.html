    const { useState, useEffect, useRef } = React;


const TRACKS = [
  { title: 'THIS IS WHO WE ARE', src: 'ThisIsWhoWeAre.mp3' },
  { title: 'WORKING FROM HOME', src: 'WorkingFromHome.mp3' },
  { title: 'POCKET CALL', src: 'PocketCall.mp3' },
];

const MusicPlayer = ({ embedded = false, currentTrack, setCurrentTrack, audioRef }) => {
  const [isPlaying, setIsPlaying] = useState(false);
  const [progress, setProgress] = useState(0);
  const [currentTime, setCurrentTime] = useState(0);
  const [duration, setDuration] = useState(0);

  const tracks = TRACKS;

  const formatTime = (s) => {
    if (!s || isNaN(s)) return '0:00';
    const mins = Math.floor(s / 60);
    const secs = Math.floor(s % 60);
    return mins + ':' + (secs < 10 ? '0' : '') + secs;
  };

  useEffect(() => {
    const audio = audioRef.current;
    if (!audio) return;

    const onTimeUpdate = () => {
      setCurrentTime(audio.currentTime);
      if (audio.duration) setProgress((audio.currentTime / audio.duration) * 100);
    };
    const onLoadedMetadata = () => setDuration(audio.duration);
    const onEnded = () => {
      setIsPlaying(false);
      setProgress(0);
      setCurrentTime(0);
    };

    audio.addEventListener('timeupdate', onTimeUpdate);
    audio.addEventListener('loadedmetadata', onLoadedMetadata);
    audio.addEventListener('ended', onEnded);
    return () => {
      audio.removeEventListener('timeupdate', onTimeUpdate);
      audio.removeEventListener('loadedmetadata', onLoadedMetadata);
      audio.removeEventListener('ended', onEnded);
    };
  }, [currentTrack]);

  useEffect(() => {
    const audio = audioRef.current;
    if (!audio) return;
    if (!tracks[currentTrack].src) {
      audio.pause();
      setIsPlaying(false);
      setProgress(0);
      setDuration(0);
      setCurrentTime(0);
      return;
    }
    audio.src = tracks[currentTrack].src;
    audio.load();
    setProgress(0);
    setCurrentTime(0);
    setDuration(0);
    if (isPlaying) {
      audio.play().catch(() => {});
    }
  }, [currentTrack]);

  const togglePlay = () => {
    const audio = audioRef.current;
    if (!audio || !tracks[currentTrack].src) return;
    if (isPlaying) {
      audio.pause();
      setIsPlaying(false);
    } else {
      audio.play().catch(() => {});
      setIsPlaying(true);
    }
  };

  const handleSeek = (e) => {
    const audio = audioRef.current;
    if (!audio || !audio.duration) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const pct = x / rect.width;
    audio.currentTime = pct * audio.duration;
  };

  const handlePrev = () => {
    const prev = currentTrack === 0 ? tracks.length - 1 : currentTrack - 1;
    setCurrentTrack(prev);
  };

  const handleNext = () => {
    const next = currentTrack === tracks.length - 1 ? 0 : currentTrack + 1;
    setCurrentTrack(next);
  };

  const containerStyle = embedded
    ? {
        backgroundColor: 'transparent',
        padding: '0',
        width: '100%',
        maxWidth: '400px',
        margin: '0 auto',
      }
    : {
        position: 'fixed',
        bottom: '24px',
        left: '24px',
        backgroundColor: 'rgba(0,0,0,0.9)',
        border: '1px solid #333',
        padding: '16px 20px',
        zIndex: 100,
        minWidth: '280px',
      };

  return (
    <div style={containerStyle}>
      <audio ref={audioRef} preload="metadata" />
      <div
        style={{
          fontFamily: '"Fira Code", monospace',
          fontSize: '10px',
          color: '#666',
          marginBottom: '8px',
        }}
      >
        NOW PLAYING
      </div>
      <div
        style={{
          fontFamily: '"Bebas Neue", sans-serif',
          fontSize: '20px',
          color: '#fff',
          letterSpacing: '0.1em',
          marginBottom: '4px',
        }}
      >
        {tracks[currentTrack].title}
      </div>
      <div
        style={{
          fontFamily: '"Fira Code", monospace',
          fontSize: '11px',
          color: '#ff2d2d',
          marginBottom: '12px',
        }}
      >
        ULTRARABBIT • {formatTime(currentTime)} / {formatTime(duration)}
      </div>

      <div
        style={{
          width: '100%',
          height: '2px',
          backgroundColor: '#222',
          marginBottom: '12px',
          cursor: tracks[currentTrack].src ? 'pointer' : 'default',
        }}
        onClick={handleSeek}
      >
        <div
          style={{
            width: `${progress}%`,
            height: '100%',
            backgroundColor: '#ff2d2d',
            transition: 'width 0.1s linear',
          }}
        />
      </div>

      <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
        <button
          onClick={handlePrev}
          style={{
            background: 'transparent',
            border: 'none',
            color: '#666',
            cursor: 'pointer',
            padding: '4px',
            transition: 'color 0.2s',
          }}
          onMouseEnter={(e) => (e.target.style.color = '#fff')}
          onMouseLeave={(e) => (e.target.style.color = '#666')}
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
          </svg>
        </button>

        <button
          onClick={togglePlay}
          style={{
            background: tracks[currentTrack].src ? '#ff2d2d' : '#333',
            border: 'none',
            borderRadius: '50%',
            width: '36px',
            height: '36px',
            cursor: tracks[currentTrack].src ? 'pointer' : 'default',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            transition: 'transform 0.2s',
          }}
          onMouseEnter={(e) => tracks[currentTrack].src && (e.target.style.transform = 'scale(1.1)')}
          onMouseLeave={(e) => (e.target.style.transform = 'scale(1)')}
        >
          {isPlaying ? (
            <svg width="14" height="14" viewBox="0 0 24 24" fill="#000">
              <path d="M6 4h4v16H6zm8 0h4v16h-4z" />
            </svg>
          ) : (
            <svg width="14" height="14" viewBox="0 0 24 24" fill="#000">
              <path d="M8 5v14l11-7z" />
            </svg>
          )}
        </button>

        <button
          onClick={handleNext}
          style={{
            background: 'transparent',
            border: 'none',
            color: '#666',
            cursor: 'pointer',
            padding: '4px',
            transition: 'color 0.2s',
          }}
          onMouseEnter={(e) => (e.target.style.color = '#fff')}
          onMouseLeave={(e) => (e.target.style.color = '#666')}
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
          </svg>
        </button>

        <div style={{ marginLeft: 'auto', display: 'flex', gap: '6px' }}>
          {tracks.map((_, idx) => (
            <button
              key={idx}
              onClick={() => setCurrentTrack(idx)}
              style={{
                width: '8px',
                height: '8px',
                borderRadius: '50%',
                backgroundColor: idx === currentTrack ? '#ff2d2d' : '#333',
                border: 'none',
                cursor: 'pointer',
                padding: 0,
                transition: 'background-color 0.2s',
              }}
            />
          ))}
        </div>
      </div>
    </div>
  );
};

const SectionHeader = ({ title }) => {
  const headerRef = useRef(null);
  const [lineWidth, setLineWidth] = useState(0);

  useEffect(() => {
    if (headerRef.current) {
      setLineWidth(headerRef.current.offsetWidth);
    }
    const handleResize = () => {
      if (headerRef.current) {
        setLineWidth(headerRef.current.offsetWidth);
      }
    };
    window.addEventListener('resize', handleResize);
    return () => window.removeEventListener('resize', handleResize);
  }, [title]);

  return (
    <div style={{ marginBottom: '48px', display: 'inline-block' }}>
      <h2
        ref={headerRef}
        style={{
          fontFamily: '"Bebas Neue", sans-serif',
          fontSize: 'clamp(96px, 16vw, 144px)',
          color: '#fff',
          letterSpacing: '0.1em',
          marginBottom: '16px',
          lineHeight: 1,
          display: 'inline-block',
        }}
      >
        {title}
      </h2>
      <div
        style={{
          width: `${lineWidth}px`,
          height: '1px',
          backgroundColor: '#ff2d2d',
          transition: 'width 0.3s ease',
        }}
      />
    </div>
  );
};

const RabbitVisualiser = ({ audioRef, currentTrack }) => {
  const mountRef = useRef(null);
  const frameRef = useRef(null);
  const stateRef = useRef({});

  const loadModel = (filename, scene, onDone) => {
    const loader = new THREE.GLTFLoader();
    const draco = new THREE.DRACOLoader();
    draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/draco/');
    loader.setDRACOLoader(draco);
    loader.load(filename, (gltf) => {
      const sceneClone = gltf.scene.clone(true);
      const meshData = [];
      sceneClone.traverse((child) => {
        if (!child.isMesh) return;
        let geo = child.geometry.clone();
        try {
          const posOnly = new THREE.BufferGeometry();
          posOnly.setAttribute('position', geo.attributes.position.clone());
          if (geo.index) posOnly.setIndex(geo.index.clone());
          const merged = THREE.BufferGeometryUtils.mergeVertices(posOnly, 0.001);
          const currentCount = merged.attributes.position.count;
          const keepCount = Math.max(120, Math.floor(currentCount * 0.05));
          const toRemove = currentCount - keepCount;
          geo = toRemove > 0 ? new THREE.SimplifyModifier().modify(merged, toRemove) : merged;
          geo.computeVertexNormals();
        } catch (e) {
          geo = new THREE.EdgesGeometry(child.geometry, 20);
        }
        child.geometry = geo;
        child.material = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true });
        const posAttr = geo.attributes.position;
        if (posAttr) meshData.push({ mesh: child, original: new Float32Array(posAttr.array) });
      });
      const rawBox = new THREE.Box3().setFromObject(sceneClone);
      const rawCenter = rawBox.getCenter(new THREE.Vector3());
      const rawSize = rawBox.getSize(new THREE.Vector3());
      sceneClone.position.sub(rawCenter);
      const baseScale = 2.0 / Math.max(rawSize.x, rawSize.y, rawSize.z);
      const outerGroup = new THREE.Group();
      outerGroup.scale.setScalar(baseScale);
      outerGroup.add(sceneClone);
      scene.add(outerGroup);
      onDone({ outerGroup, baseScale, meshData });
    }, undefined, (err) => console.warn('GLB error:', err));
  };

  // Mount once — renderer, scene, camera, audio, animation loop
  useEffect(() => {
    const mount = mountRef.current;
    if (!mount) return;

    const W = mount.offsetWidth || window.innerWidth;
    const H = mount.offsetHeight || window.innerHeight;

    const scene = new THREE.Scene();
    stateRef.current.scene = scene;

    const camera = new THREE.PerspectiveCamera(60, W / H, 0.1, 100);
    camera.position.set(0, 0, 5);
    stateRef.current.camera = camera;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(W, H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);
    renderer.domElement.style.display = 'block';
    mount.appendChild(renderer.domElement);

    loadModel(TRACK_MODELS[0], scene, ({ outerGroup, baseScale, meshData }) => {
      stateRef.current.outerGroup = outerGroup;
      stateRef.current.baseScale = baseScale;
      stateRef.current.meshData = meshData;
    });

    const setupAudio = () => {
      if (stateRef.current.analyser || !audioRef.current) return;
      try {
        if (!window._urAudioCtx) {
          window._urAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
          window._urSource = window._urAudioCtx.createMediaElementSource(audioRef.current);
        }
        const an = window._urAudioCtx.createAnalyser();
        an.fftSize = 512;
        an.smoothingTimeConstant = 0.75;
        window._urSource.connect(an);
        an.connect(window._urAudioCtx.destination);
        stateRef.current.analyser = an;
        stateRef.current.dataArray = new Uint8Array(an.frequencyBinCount);
      } catch (e) { console.warn('Audio:', e); }
    };

    const audio = audioRef.current;
    if (audio) {
      if (!audio.paused) setupAudio();
      audio.addEventListener('play', setupAudio, { once: true });
    }

    let time = 0;
    let flashDecay = 0;

    const animate = () => {
      frameRef.current = requestAnimationFrame(animate);
      time += 0.016;
      const { analyser: an, dataArray: da, outerGroup: rg, baseScale: bs, meshData: md } = stateRef.current;
      let bass = 0, mid = 0, overall = 0;
      if (an && da) {
        an.getByteFrequencyData(da);
        const len = da.length;
        for (let i = 0; i < 8;  i++) bass    += da[i]; bass    = bass    / 8   / 255;
        for (let i = 8; i < 48; i++) mid     += da[i]; mid     = mid     / 40  / 255;
        for (let i = 0; i < len; i++) overall += da[i]; overall = overall / len / 255;
      }
      const zoomTarget = 4.2 + Math.sin(time * 0.18) * 3.0 - bass * 2.0;
      camera.position.z += (Math.max(0.5, zoomTarget) - camera.position.z) * 0.03;
      if (rg && bs) {
        rg.rotation.y += 0.004 + mid * 0.05;
        rg.rotation.x = Math.sin(time * 0.11) * 0.1;
        rg.position.y = Math.sin(time * 0.85) * 0.08;
        rg.scale.setScalar(bs * (1 + bass * 0.32));
        flashDecay = Math.max(flashDecay - 0.05, bass * 1.9);
        const flash = Math.min(flashDecay, 1);
        if (md) {
          md.forEach(({ mesh, original }) => {
            mesh.material.color.setRGB(1, 1 - flash * 0.85, 1 - flash * 0.85);
            const posAttr = mesh.geometry.attributes.position;
            if (!posAttr) return;
            const energy = Math.max(overall - 0.04, 0);
            const saw = (time * 1.8) % 1;
            for (let i = 0; i < posAttr.count; i++) {
              const ix = i * 3;
              const sin1 = Math.sin(time * 5.5 + i * 0.22) * (bass * 0.18 + energy * 0.04);
              const sin2 = Math.cos(time * 3.2 + i * 0.13) * (mid  * 0.10 + energy * 0.02);
              const sawtooth = ((saw + i * 0.011) % 1 - 0.5) * overall * 0.12;
              posAttr.array[ix]     = original[ix]     + sin1;
              posAttr.array[ix + 1] = original[ix + 1] + sin2 + sawtooth;
              posAttr.array[ix + 2] = original[ix + 2] + sin1 * 0.6;
            }
            posAttr.needsUpdate = true;
          });
        }
      }
      renderer.render(scene, camera);
    };
    animate();

    const onResize = () => {
      const w = mount.offsetWidth || window.innerWidth;
      const h = mount.offsetHeight || window.innerHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    };
    window.addEventListener('resize', onResize);

    return () => {
      cancelAnimationFrame(frameRef.current);
      window.removeEventListener('resize', onResize);
      if (audio) audio.removeEventListener('play', setupAudio);
      renderer.dispose();
      if (mount.contains(renderer.domElement)) mount.removeChild(renderer.domElement);
    };
  }, []);

  // Track change — swap model
  useEffect(() => {
    const { scene } = stateRef.current;
    if (!scene) return;
    if (stateRef.current.outerGroup) {
      scene.remove(stateRef.current.outerGroup);
      stateRef.current.outerGroup = null;
      stateRef.current.baseScale = null;
      stateRef.current.meshData = null;
    }
    const file = TRACK_MODELS[currentTrack] || TRACK_MODELS[0];
    loadModel(file, scene, ({ outerGroup, baseScale, meshData }) => {
      stateRef.current.outerGroup = outerGroup;
      stateRef.current.baseScale = baseScale;
      stateRef.current.meshData = meshData;
    });
  }, [currentTrack]);
