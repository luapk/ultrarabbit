<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ULTRARABBIT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Code:wght@400;500&family=Space+Mono&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { background: #000; overflow-x: hidden; }
    ::selection { background: #ff2d2d; color: #000; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #ff2d2d; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/BufferGeometryUtils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/modifiers/SimplifyModifier.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

const TRACKS = [
  { title: 'THIS IS WHO WE ARE', src: 'ThisIsWhoWeAre.mp3' },
  { title: 'WORKING FROM HOME', src: 'WorkingFromHome.mp3' },
  { title: 'POCKET CALL', src: 'PocketCall.mp3' },
];

const MusicPlayer = ({ embedded = false, currentTrack, setCurrentTrack, audioRef }) => {
  const [isPlaying, setIsPlaying] = useState(false);
  const [progress, setProgress] = useState(0);
  const [currentTime, setCurrentTime] = useState(0);
  const [duration, setDuration] = useState(0);

  const formatTime = (s) => {
    if (!s || isNaN(s)) return '0:00';
    const mins = Math.floor(s / 60);
    const secs = Math.floor(s % 60);
    return mins + ':' + (secs < 10 ? '0' : '') + secs;
  };

  useEffect(() => {
    const audio = audioRef.current;
    if (!audio) return;
    const onTimeUpdate = () => {
      setCurrentTime(audio.currentTime);
      if (audio.duration) setProgress((audio.currentTime / audio.duration) * 100);
    };
    const onLoadedMetadata = () => setDuration(audio.duration);
    const onEnded = () => { setIsPlaying(false); setProgress(0); setCurrentTime(0); };
    audio.addEventListener('timeupdate', onTimeUpdate);
    audio.addEventListener('loadedmetadata', onLoadedMetadata);
    audio.addEventListener('ended', onEnded);
    return () => {
      audio.removeEventListener('timeupdate', onTimeUpdate);
      audio.removeEventListener('loadedmetadata', onLoadedMetadata);
      audio.removeEventListener('ended', onEnded);
    };
  }, [currentTrack]);

  useEffect(() => {
    const audio = audioRef.current;
    if (!audio) return;
    audio.src = TRACKS[currentTrack].src;
    audio.load();
    if (isPlaying) audio.play().catch(() => {});
  }, [currentTrack]);

  const togglePlay = () => {
    const audio = audioRef.current;
    if (!audio) return;
    if (isPlaying) { audio.pause(); setIsPlaying(false); }
    else { audio.play().catch(() => {}); setIsPlaying(true); }
  };

  const containerStyle = embedded ? { width: '100%', maxWidth: '400px', margin: '0 auto' } : { position: 'fixed', bottom: '24px', left: '24px', backgroundColor: 'rgba(0,0,0,0.9)', border: '1px solid #333', padding: '16px 20px', zIndex: 100, minWidth: '280px' };

  return (
    <div style={containerStyle}>
      <audio ref={audioRef} preload="metadata" />
      <div style={{ fontFamily: '"Fira Code", monospace', fontSize: '10px', color: '#666', marginBottom: '8px' }}>NOW PLAYING</div>
      <div style={{ fontFamily: '"Bebas Neue", sans-serif', fontSize: '20px', color: '#fff', letterSpacing: '0.1em', marginBottom: '4px' }}>{TRACKS[currentTrack].title}</div>
      <div style={{ fontFamily: '"Fira Code", monospace', fontSize: '11px', color: '#ff2d2d', marginBottom: '12px' }}>ULTRARABBIT • {formatTime(currentTime)} / {formatTime(duration)}</div>
      <div style={{ width: '100%', height: '2px', backgroundColor: '#222', marginBottom: '20px', cursor: 'pointer' }} onClick={(e) => { const rect = e.currentTarget.getBoundingClientRect(); audioRef.current.currentTime = ((e.clientX - rect.left) / rect.width) * audioRef.current.duration; }}>
        <div style={{ width: `${progress}%`, height: '100%', backgroundColor: '#ff2d2d', transition: 'width 0.1s linear' }} />
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: '16px' }}>
        <button onClick={() => setCurrentTrack(currentTrack === 0 ? TRACKS.length - 1 : currentTrack - 1)} style={{ background: '#fff', border: 'none', borderRadius: '50%', width: '32px', height: '32px', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="#000"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" /></svg>
        </button>
        <button onClick={togglePlay} style={{ background: '#ff2d2d', border: 'none', borderRadius: '50%', width: '40px', height: '40px', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          {isPlaying ? <svg width="16" height="16" viewBox="0 0 24 24" fill="#000"><path d="M6 4h4v16H6zm8 0h4v16h-4z" /></svg> : <svg width="16" height="16" viewBox="0 0 24 24" fill="#000"><path d="M8 5v14l11-7z" /></svg>}
        </button>
        <button onClick={() => setCurrentTrack(currentTrack === TRACKS.length - 1 ? 0 : currentTrack + 1)} style={{ background: '#fff', border: 'none', borderRadius: '50%', width: '32px', height: '32px', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="#000"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" /></svg>
        </button>
      </div>
    </div>
  );
};

const SectionHeader = ({ title }) => (
  <div style={{ marginBottom: '48px', display: 'inline-block' }}>
    <h2 style={{ fontFamily: '"Bebas Neue", sans-serif', fontSize: 'clamp(96px, 16vw, 144px)', color: '#fff', letterSpacing: '0.1em', lineHeight: 1 }}>{title}</h2>
    <div style={{ width: '100%', height: '1px', backgroundColor: '#ff2d2d' }} />
  </div>
);

const RabbitVisualiser = ({ audioRef }) => {
  const mountRef = useRef(null);
  const frameRef = useRef(null);
  const stateRef = useRef({});

  useEffect(() => {
    const mount = mountRef.current;
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.z = 5;
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    mount.appendChild(renderer.domElement);

    const loader = new THREE.GLTFLoader();
    const draco = new THREE.DRACOLoader();
    draco.setDecoderPath('https://www.gstatic.com/draco/v1/decoders/');
    loader.setDRACOLoader(draco);

    loader.load('rabbit.glb', (gltf) => {
      const model = gltf.scene;
      const meshData = [];
      model.traverse((child) => {
        if (child.isMesh) {
          let geo = child.geometry.clone();
          const posOnly = new THREE.BufferGeometry();
          posOnly.setAttribute('position', geo.attributes.position.clone());
          if (geo.index) posOnly.setIndex(geo.index.clone());
          const merged = THREE.BufferGeometryUtils.mergeVertices(posOnly, 0.001);
          const keepCount = Math.max(120, Math.floor(merged.attributes.position.count * 0.05));
          geo = new THREE.SimplifyModifier().modify(merged, merged.attributes.position.count - keepCount);
          child.geometry = geo;
          child.material = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true });
          meshData.push({ mesh: child, original: new Float32Array(geo.attributes.position.array) });
        }
      });
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      model.position.sub(center);
      const baseScale = 2.5 / box.getSize(new THREE.Vector3()).y;
      const group = new THREE.Group();
      group.scale.setScalar(baseScale);
      group.add(model);
      scene.add(group);
      stateRef.current = { group, baseScale, meshData };
    });

    const setupAudio = () => {
      if (stateRef.current.analyser || !audioRef.current) return;
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const source = ctx.createMediaElementSource(audioRef.current);
      const analyser = ctx.createAnalyser();
      analyser.fftSize = 256;
      source.connect(analyser);
      analyser.connect(ctx.destination);
      stateRef.current.analyser = analyser;
      stateRef.current.dataArray = new Uint8Array(analyser.frequencyBinCount);
    };
    audioRef.current?.addEventListener('play', setupAudio, { once: true });

    const animate = () => {
      frameRef.current = requestAnimationFrame(animate);
      const { group, meshData, analyser, dataArray, baseScale } = stateRef.current;
      let bass = 0;
      if (analyser) {
        analyser.getByteFrequencyData(dataArray);
        bass = dataArray[0] / 255;
      }
      if (group) {
        group.rotation.y += 0.005 + bass * 0.02;
        group.scale.setScalar(baseScale * (1 + bass * 0.2));
        meshData.forEach(({ mesh, original }) => {
          const pos = mesh.geometry.attributes.position;
          for (let i = 0; i < pos.count; i++) {
            const ix = i * 3;
            pos.array[ix+1] = original[ix+1] + Math.sin(Date.now() * 0.005 + i) * bass * 0.1;
          }
          pos.needsUpdate = true;
          mesh.material.color.setRGB(1, 1 - bass, 1 - bass);
        });
      }
      renderer.render(scene, camera);
    };
    animate();
    const onResize = () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
    window.addEventListener('resize', onResize);
    return () => { cancelAnimationFrame(frameRef.current); window.removeEventListener('resize', onResize); };
  }, []);
  return <div ref={mountRef} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', zIndex: 0, pointerEvents: 'none' }} />;
};

const ALL_LYRICS = [
  {
    title: 'THIS IS WHO WE ARE',
    stanzas: [
      { label: 'V1', text: `we're blasting off\nwe're in control\nyou can't hold us back\nwe're standing tall\nthe world is ours\nso it begins\nthe ULTRARABBIT\nalways wins` },
      { label: 'CHORUS', text: `this is who we are now\nthis is what we do\nthis is who we are now\nthis is what we do` },
      { label: 'V2', text: `we're beautiful\nwe're in your face\nwe're first in line\nour rightful place\nthe world is ours\nso it begins\nthe ULTRARABBIT\nalways wins` }
    ],
  },
  {
    title: 'WORKING FROM HOME',
    stanzas: [
      { label: 'V1', text: `when people say ease back\ni say fuck that\nthe night is young\ncome on\nlet's have fun` },
      { label: 'CHORUS', text: `let's party like we don't have work in the morning\nthe worst that can happen\nis a written warning\nnext round's on me\nwhat do you say?\ni'm working from home\ntomorrow anyway` }
    ],
  },
  {
    title: 'POCKET CALL',
    stanzas: [
      { label: 'CHORUS', text: `hey babe did you mean\nto ring?\ngod, sorry no\nit was a pocket call\ndid you mean to ring me\nat all?\nno sorry no\nit was a pocket call` },
      { label: 'V1', text: `what did you hear?\nwhat did i say?\nhow long were you listening\nanyway?` }
    ],
  },
];

const UltraRabbitWebsite = () => {
  const [currentTrack, setCurrentTrack] = useState(0);
  const audioRef = useRef(null);
  return (
    <div style={{ backgroundColor: '#000', color: '#fff', minHeight: '100vh', fontFamily: '"Space Mono", monospace' }}>
      <section id="about" style={{ padding: '80px 40px', textAlign: 'center' }}>
        <img src="logo.jpg" style={{ width: '100%', maxWidth: '800px', marginBottom: '40px' }} />
        <div style={{ maxWidth: '800px', margin: '0 auto' }}>
          <SectionHeader title="ABOUT" />
          <p style={{ color: '#999', lineHeight: 2 }}>ULTRARABBIT are a music band formed in 2026. Electronic dance music blending house, funk, and rock with sharp suits and rabbit ears.</p>
        </div>
      </section>

      <div style={{ position: 'relative', minHeight: '100vh', overflow: 'hidden' }}>
        <RabbitVisualiser audioRef={audioRef} />
        <section id="listen" style={{ position: 'relative', zIndex: 1, padding: '120px 40px', textAlign: 'center' }}>
          <SectionHeader title="LISTEN" />
          <div style={{ backgroundColor: 'rgba(10,10,10,0.8)', padding: '40px', border: '1px solid #222', display: 'inline-block' }}>
            <MusicPlayer embedded={true} currentTrack={currentTrack} setCurrentTrack={setCurrentTrack} audioRef={audioRef} />
          </div>
        </section>
        
        <section id="lyrics" style={{ position: 'relative', zIndex: 1, padding: '120px 40px', maxWidth: '800px', margin: '0 auto' }}>
          <SectionHeader title="LYRICS" />
          <div style={{ fontFamily: '"Bebas Neue"', fontSize: '32px', color: '#ff2d2d', marginBottom: '20px' }}>{ALL_LYRICS[currentTrack].title}</div>
          {ALL_LYRICS[currentTrack].stanzas.map((s, i) => (
            <div key={i} style={{ marginBottom: '40px' }}>
              <span style={{ color: '#ff2d2d', fontSize: '12px', display: 'block', marginBottom: '10px' }}>{s.label}</span>
              <div style={{ whiteSpace: 'pre-wrap', color: '#999', lineHeight: 2 }}>{s.text}</div>
            </div>
          ))}
        </section>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<UltraRabbitWebsite />);
  </script>
</body>
</html>
