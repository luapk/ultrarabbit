<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ULTRARABBIT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Code:wght@400;500&family=Space+Mono&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { background: #000; overflow-x: hidden; }
    ::selection { background: #ff2d2d; color: #000; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #ff2d2d; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/BufferGeometryUtils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/modifiers/SimplifyModifier.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const TRACKS = [
      { title: 'THIS IS WHO WE ARE', src: 'ThisIsWhoWeAre.mp3' },
      { title: 'WORKING FROM HOME', src: 'WorkingFromHome.mp3' },
      { title: 'POCKET CALL', src: 'PocketCall.mp3' },
    ];

    const MusicPlayer = ({ embedded = false, currentTrack, setCurrentTrack, audioRef }) => {
      const [isPlaying, setIsPlaying] = useState(false);
      const [progress, setProgress] = useState(0);
      const [currentTime, setCurrentTime] = useState(0);
      const [duration, setDuration] = useState(0);

      const formatTime = (s) => {
        if (!s || isNaN(s)) return '0:00';
        const mins = Math.floor(s / 60);
        const secs = Math.floor(s % 60);
        return mins + ':' + (secs < 10 ? '0' : '') + secs;
      };

      useEffect(() => {
        const audio = audioRef.current;
        if (!audio) return;
        const onTimeUpdate = () => {
          setCurrentTime(audio.currentTime);
          if (audio.duration) setProgress((audio.currentTime / audio.duration) * 100);
        };
        const onLoadedMetadata = () => setDuration(audio.duration);
        const onEnded = () => { setIsPlaying(false); setProgress(0); setCurrentTime(0); };
        audio.addEventListener('timeupdate', onTimeUpdate);
        audio.addEventListener('loadedmetadata', onLoadedMetadata);
        audio.addEventListener('ended', onEnded);
        return () => {
          audio.removeEventListener('timeupdate', onTimeUpdate);
          audio.removeEventListener('loadedmetadata', onLoadedMetadata);
          audio.removeEventListener('ended', onEnded);
        };
      }, [currentTrack]);

      useEffect(() => {
        const audio = audioRef.current;
        if (!audio) return;
        audio.src = TRACKS[currentTrack].src;
        audio.load();
        setProgress(0);
        setCurrentTime(0);
        if (isPlaying) audio.play().catch(() => {});
      }, [currentTrack]);

      const togglePlay = () => {
        const audio = audioRef.current;
        if (!audio) return;
        if (isPlaying) {
          audio.pause();
          setIsPlaying(false);
        } else {
          audio.play().catch(() => {});
          setIsPlaying(true);
        }
      };

      const handleSeek = (e) => {
        const audio = audioRef.current;
        if (!audio || !audio.duration) return;
        const rect = e.currentTarget.getBoundingClientRect();
        audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
      };

      const handlePrev = () => setCurrentTrack(currentTrack === 0 ? TRACKS.length - 1 : currentTrack - 1);
      const handleNext = () => setCurrentTrack(currentTrack === TRACKS.length - 1 ? 0 : currentTrack + 1);

      const containerStyle = embedded ? { width: '100%', maxWidth: '400px', margin: '0 auto' } : 
      { position: 'fixed', bottom: '24px', left: '24px', backgroundColor: 'rgba(0,0,0,0.9)', border: '1px solid #333', padding: '16px 20px', zIndex: 100, minWidth: '280px' };

      return (
        <div style={containerStyle}>
          <audio ref={audioRef} preload="metadata" />
          <div style={{ fontFamily: '"Fira Code", monospace', fontSize: '10px', color: '#666', marginBottom: '8px' }}>NOW PLAYING</div>
          <div style={{ fontFamily: '"Bebas Neue", sans-serif', fontSize: '20px', color: '#fff', letterSpacing: '0.1em', marginBottom: '4px' }}>{TRACKS[currentTrack].title}</div>
          <div style={{ fontFamily: '"Fira Code", monospace', fontSize: '11px', color: '#ff2d2d', marginBottom: '12px' }}>ULTRARABBIT • {formatTime(currentTime)} / {formatTime(duration)}</div>
          
          <div style={{ width: '100%', height: '2px', backgroundColor: '#222', marginBottom: '20px', cursor: 'pointer' }} onClick={handleSeek}>
            <div style={{ width: `${progress}%`, height: '100%', backgroundColor: '#ff2d2d', transition: 'width 0.1s linear' }} />
          </div>

          <div style={{ display: 'flex', alignItems: 'center', gap: '16px' }}>
            <button onClick={handlePrev} style={{ background: '#fff', border: 'none', borderRadius: '50%', width: '32px', height: '32px', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'transform 0.2s' }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="#000"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" /></svg>
            </button>

            <button onClick={togglePlay} style={{ background: '#ff2d2d', border: 'none', borderRadius: '50%', width: '40px', height: '40px', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'transform 0.2s' }}>
              {isPlaying ? <svg width="16" height="16" viewBox="0 0 24 24" fill="#000"><path d="M6 4h4v16H6zm8 0h4v16h-4z" /></svg> : <svg width="16" height="16" viewBox="0 0 24 24" fill="#000"><path d="M8 5v14l11-7z" /></svg>}
            </button>

            <button onClick={handleNext} style={{ background: '#fff', border: 'none', borderRadius: '50%', width: '32px', height: '32px', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'transform 0.2s' }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="#000"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" /></svg>
            </button>

            <div style={{ marginLeft: 'auto', display: 'flex', gap: '6px' }}>
              {TRACKS.map((_, idx) => (
                <button key={idx} onClick={() => setCurrentTrack(idx)} style={{ width: '8px', height: '8px', borderRadius: '50%', backgroundColor: idx === currentTrack ? '#ff2d2d' : '#333', border: 'none', cursor: 'pointer', padding: 0 }} />
              ))}
            </div>
          </div>
        </div>
      );
    };

    const BurgerMenu = ({ isOpen, setIsOpen, scrollToSection }) => {
      const menuItems = [{ name: 'ABOUT', id: 'about' }, { name: 'GIGS', id: 'gigs' }, { name: 'LISTEN', id: 'listen' }, { name: 'LYRICS', id: 'lyrics' }, { name: 'MERCH', id: 'merch', comingSoon: true }];
      return (
        <>
          <button onClick={() => setIsOpen(!isOpen)} style={{ position: 'fixed', top: '24px', right: '24px', zIndex: 1001, background: 'transparent', border: 'none', cursor: 'pointer', padding: '10px' }}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
              <span style={{ display: 'block', width: '32px', height: '2px', backgroundColor: '#fff', transition: '0.3s', transform: isOpen ? 'rotate(45deg) translate(6px, 6px)' : 'none' }} />
              <span style={{ display: 'block', width: '32px', height: '2px', backgroundColor: '#fff', transition: '0.3s', opacity: isOpen ? 0 : 1 }} />
              <span style={{ display: 'block', width: '32px', height: '2px', backgroundColor: '#fff', transition: '0.3s', transform: isOpen ? 'rotate(-45deg) translate(6px, -6px)' : 'none' }} />
            </div>
          </button>
          <nav style={{ position: 'fixed', top: 0, right: 0, width: isOpen ? '100%' : '0', height: '100vh', backgroundColor: 'rgba(0,0,0,0.97)', zIndex: 1000, display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center', overflow: 'hidden', transition: '0.4s' }}>
            {menuItems.map((item, index) => (
              <button key={item.name} onClick={() => { if (!item.comingSoon) { scrollToSection(item.id); setIsOpen(false); } }} style={{ background: 'transparent', border: 'none', fontFamily: '"Bebas Neue", sans-serif', fontSize: 'clamp(48px, 10vw, 96px)', color: item.comingSoon ? '#333' : '#fff', cursor: item.comingSoon ? 'default' : 'pointer', letterSpacing: '0.1em', padding: '10px 40px', opacity: isOpen ? 1 : 0, transition: '0.3s', transitionDelay: `${index * 0.1}s` }}>
                {item.name}
              </button>
            ))}
          </nav>
        </>
      );
    };

    const SectionHeader = ({ title }) => (
      <div style={{ marginBottom: '48px' }}>
        <h2 style={{ fontFamily: '"Bebas Neue", sans-serif', fontSize: 'clamp(96px, 16vw, 144px)', color: '#fff', letterSpacing: '0.1em', lineHeight: 1 }}>{title}</h2>
        <div style={{ width: '100px', height: '1px', backgroundColor: '#ff2d2d' }} />
      </div>
    );

    const RabbitVisualiser = ({ audioRef }) => {
      const mountRef = useRef(null);
      const frameRef = useRef(null);
      const stateRef = useRef({});

      useEffect(() => {
        const mount = mountRef.current;
        if (!mount) return;
        const W = mount.offsetWidth;
        const H = mount.offsetHeight;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, W / H, 0.1, 100);
        camera.position.set(0, 0, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(W, H);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        mount.appendChild(renderer.domElement);

        const meshData = [];
        const loader = new THREE.GLTFLoader();
        const draco = new THREE.DRACOLoader();
        draco.setDecoderPath('https://www.gstatic.com/draco/v1/decoders/');
        loader.setDRACOLoader(draco);

        loader.load('rabbit.glb', (gltf) => {
          const sceneClone = gltf.scene.clone(true);
          sceneClone.traverse((child) => {
            if (!child.isMesh) return;
            let geo = child.geometry.clone();
            try {
              const posOnly = new THREE.BufferGeometry();
              posOnly.setAttribute('position', geo.attributes.position.clone());
              if (geo.index) posOnly.setIndex(geo.index.clone());
              const merged = THREE.BufferGeometryUtils.mergeVertices(posOnly, 0.001);
              const keepCount = Math.max(120, Math.floor(merged.attributes.position.count * 0.05));
              const modifier = new THREE.SimplifyModifier();
              geo = modifier.modify(merged, merged.attributes.position.count - keepCount);
              geo.computeVertexNormals();
            } catch (e) { geo = new THREE.EdgesGeometry(child.geometry, 20); }
            child.geometry = geo;
            child.material = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true });
            if (geo.attributes.position) meshData.push({ mesh: child, original: new Float32Array(geo.attributes.position.array) });
          });

          const box = new THREE.Box3().setFromObject(sceneClone);
          const center = box.getCenter(new THREE.Vector3());
          const size = box.getSize(new THREE.Vector3());
          sceneClone.position.sub(center);
          const baseScale = 2.0 / Math.max(size.x, size.y, size.z);
          const outerGroup = new THREE.Group();
          outerGroup.scale.setScalar(baseScale);
          outerGroup.add(sceneClone);
          scene.add(outerGroup);
          stateRef.current = { outerGroup, baseScale, meshData };
        });

        const setupAudio = () => {
          if (stateRef.current.analyser || !audioRef.current) return;
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const source = ctx.createMediaElementSource(audioRef.current);
          const analyser = ctx.createAnalyser();
          analyser.fftSize = 512;
          source.connect(analyser);
          analyser.connect(ctx.destination);
          stateRef.current.analyser = analyser;
          stateRef.current.dataArray = new Uint8Array(analyser.frequencyBinCount);
        };
        audioRef.current?.addEventListener('play', setupAudio, { once: true });

        let time = 0;
        const animate = () => {
          frameRef.current = requestAnimationFrame(animate);
          time += 0.016;
          const { outerGroup: rg, baseScale: bs, meshData: md, analyser: an, dataArray: da } = stateRef.current;
          let bass = 0, mid = 0, overall = 0;
          if (an && da) {
            an.getByteFrequencyData(da);
            for (let i = 0; i < 8; i++) bass += da[i]; bass = bass / 8 / 255;
            for (let i = 8; i < 48; i++) mid += da[i]; mid = mid / 40 / 255;
            for (let i = 0; i < da.length; i++) overall += da[i]; overall = overall / da.length / 255;
          }
          camera.position.z += (Math.max(0.5, 4.2 + Math.sin(time * 0.18) * 3.0 - bass * 2.0) - camera.position.z) * 0.03;
          if (rg && bs) {
            rg.rotation.y += 0.004 + mid * 0.05;
            rg.position.y = Math.sin(time * 0.85) * 0.08;
            rg.scale.setScalar(bs * (1 + bass * 0.32));
            md?.forEach(({ mesh, original }) => {
              const pos = mesh.geometry.attributes.position;
              const energy = Math.max(overall - 0.04, 0);
              for (let i = 0; i < pos.count; i++) {
                const ix = i * 3;
                pos.array[ix] = original[ix] + Math.sin(time * 5.5 + i * 0.22) * (bass * 0.18 + energy * 0.04);
                pos.array[ix+1] = original[ix+1] + Math.cos(time * 3.2 + i * 0.13) * (mid * 0.10 + energy * 0.02);
              }
              pos.needsUpdate = true;
              mesh.material.color.setRGB(1, 1 - bass, 1 - bass);
            });
          }
          renderer.render(scene, camera);
        };
        animate();
        return () => { cancelAnimationFrame(frameRef.current); renderer.dispose(); };
      }, []);
      return <div ref={mountRef} style={{ position: 'absolute', inset: 0, zIndex: 0, pointerEvents: 'none' }} />;
    };

    const AboutSection = () => (
      <section id="about" style={{ minHeight: '100vh', padding: '80px 40px' }}>
        <div style={{ textAlign: 'center', marginBottom: '60px' }}>
          <img src="logo.jpg" alt="ULTRARABBIT" style={{ width: '100%', maxWidth: '800px' }} />
        </div>
        <div style={{ maxWidth: '900px', margin: '0 auto', display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: '40px' }}>
          <div>
            <SectionHeader title="ABOUT" />
            <p style={{ fontFamily: '"Space Mono", monospace', color: '#999', lineHeight: 2 }}>ULTRARABBIT are a music band formed by Andy H, Eva M and Paul K in 2026. Electronic dance music blending house, funk, and rock with sharp suits and rabbit ears.</p>
          </div>
          <video autoPlay loop muted playsInline style={{ width: '100%', border: '1px solid #1a1a1a' }}><source src="ULTRARABBIT.mp4" type="video/mp4" /></video>
        </div>
      </section>
    );

    const GigsSection = () => {
      const gigs = [
        { date: 'APR 3', venue: 'POCO LOCO', city: 'CHATHAM', iso: '2026-04-03' },
        { date: 'APR 12', venue: "FIDDLER'S ELBOW", city: 'LONDON', iso: '2026-04-12' },
        { date: 'MAY 16', venue: 'CAVENDISH ARMS', city: 'LONDON', iso: '2026-05-16' },
        { date: 'JUN 5', venue: "WITH WE ARE NOT DEVO • FIDDLER'S ELBOW", city: 'LONDON', iso: '2026-06-05' },
        { date: 'JUL 25', venue: 'SPECIAL GUESTS FOR SIGUE SIGUE SPUTNIK • 229', city: 'LONDON', iso: '2026-07-25' }
      ];
      const today = new Date().setHours(0,0,0,0);
      return (
        <section id="gigs" style={{ padding: '120px 40px', backgroundColor: '#0a0a0a' }}>
          <div style={{ maxWidth: '1000px', margin: '0 auto' }}>
            <SectionHeader title="GIGS" />
            {gigs.map((g, i) => {
              const past = new Date(g.iso) < today;
              return (
                <div key={i} style={{ display: 'grid', gridTemplateColumns: '120px 1fr', padding: '32px', borderBottom: '1px solid #1a1a1a', opacity: past ? 0.3 : 1 }}>
                  <div style={{ fontFamily: '"Bebas Neue"', fontSize: '32px', color: '#ff2d2d' }}>{g.date}</div>
                  <div style={{ color: '#fff' }}><div style={{ fontSize: '22px', fontFamily: '"Bebas Neue"' }}>{g.venue}</div><div style={{ fontSize: '12px', color: '#666' }}>{g.city}</div></div>
                </div>
              );
            })}
          </div>
        </section>
      );
    };

    const ALL_LYRICS = [
      { title: 'THIS IS WHO WE ARE', text: 'we\'re blasting off\nwe\'re in control\nyou can\'t hold us back\nwe\'re standing tall' },
      { title: 'WORKING FROM HOME', text: 'let\'s party like we don\'t have work in the morning\nthe worst that can happen\nis a written warning' },
      { title: 'POCKET CALL', text: 'hey babe did you mean\nto ring?\ngod, sorry no\nit was a pocket call' }
    ];

    function UltraRabbitWebsite() {
      const [menuOpen, setMenuOpen] = useState(false);
      const [currentTrack, setCurrentTrack] = useState(0);
      const audioRef = useRef(null);
      const scrollToSection = (id) => document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });

      return (
        <div style={{ backgroundColor: '#000', minHeight: '100vh' }}>
          <BurgerMenu isOpen={menuOpen} setIsOpen={setMenuOpen} scrollToSection={scrollToSection} />
          <AboutSection />
          <GigsSection />
          <div style={{ position: 'relative' }}>
            <RabbitVisualiser audioRef={audioRef} />
            <section id="listen" style={{ padding: '120px 40px', textAlign: 'center', position: 'relative', zIndex: 1 }}>
              <SectionHeader title="LISTEN" />
              <div style={{ backgroundColor: 'rgba(10,10,10,0.8)', padding: '40px', display: 'inline-block', border: '1px solid #222' }}>
                <MusicPlayer embedded={true} currentTrack={currentTrack} setCurrentTrack={setCurrentTrack} audioRef={audioRef} />
              </div>
            </section>
            <section id="lyrics" style={{ padding: '120px 40px', textAlign: 'center', position: 'relative', zIndex: 1 }}>
              <SectionHeader title="LYRICS" />
              <div style={{ color: '#ff2d2d', fontFamily: '"Bebas Neue"', fontSize: '24px' }}>{ALL_LYRICS[currentTrack].title}</div>
              <pre style={{ color: '#666', fontFamily: '"Space Mono"', whiteSpace: 'pre-wrap', lineHeight: 2, marginTop: '20px' }}>{ALL_LYRICS[currentTrack].text}</pre>
            </section>
          </div>
          <footer style={{ padding: '80px', textAlign: 'center', borderTop: '1px solid #111' }}>
            <div style={{ color: '#fff', fontFamily: '"Bebas Neue"', fontSize: '24px' }}>ULTRARABBIT</div>
            <div style={{ color: '#333', fontSize: '10px', marginTop: '20px' }}>© 2026 ALL RIGHTS RESERVED</div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<UltraRabbitWebsite />);
  </script>
</body>
</html>
